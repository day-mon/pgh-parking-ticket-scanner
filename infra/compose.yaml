services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pgh_ticket
      POSTGRES_USER: pgh_ticket
      POSTGRES_PASSWORD: pgh_ticket
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgh_ticket"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
